[package]
name = "zip-install"
version = "0.1.0"
edition = "2024"

[profile.release]
codegen-units = 1
lto = true
opt-level = "s"
strip = true

[build-dependencies]
winresource = "0.1.28"

[dependencies]
eframe = "0.33.3"

[dependencies.windows]
version = "0.62.2"
features = ["Win32_UI_WindowsAndMessaging"]
