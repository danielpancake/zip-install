[package]
name = "zip-install"
version = "0.1.0"
edition = "2024"

[profile.release]
codegen-units = 1
lto = true
opt-level = "s"
strip = true

[dependencies]
anyhow = "1.0.100"
dirs = "6.0.0"
eframe = "0.33.3"
zip = "7.0.0"

[dependencies.native-dialog]
version = "0.9.4"
features = [
    "windows_dpi_awareness",
    "windows_visual_styles"
]

[dependencies.uuid]
version = "1.19.0"
features = ["v4"]

[target.'cfg(windows)'.dependencies]
mslnk = "0.1.8"
winreg = "0.55.0"
